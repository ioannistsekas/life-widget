<style>
body{
    background:#191919;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    margin:0;
    padding:12px;
}

.title{
    font-size:14px;
    font-weight:500;
    margin-bottom:8px;
    color:rgba(255,255,255,.9);
}

.progress-bar{
    width:100%;
    height:8px;
    background:#333;
    border-radius:4px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#4caf50,#66bb6a);
    transition:width .5s ease;
}

.stats{
    margin-top:8px;
    font-size:12px;
    color:#9e9e9e;
}
</style>


<div class="title">🌱 Χρόνος Ζωής</div>

<div class="progress-bar">
    <div class="progress-fill" id="bar"></div>
</div>

<div class="stats" id="text">
Υπολογισμός...
</div>


<script>

// Ημερομηνία γέννησης
const birth = new Date(1992,6,23);

// Σήμερα
const today = new Date();


// Ημερομηνία 80ων γενεθλίων
const eighty = new Date(2072,6,23);


// Διαφορές ημερών
const livedDays = Math.floor(
(today-birth)/(1000*60*60*24)
);

const totalDays = Math.floor(
(eighty-birth)/(1000*60*60*24)
);

const remainingDays = Math.floor(
(eighty-today)/(1000*60*60*24)
);


// Ηλικία
let age = today.getFullYear()-birth.getFullYear();

if(
today.getMonth()<birth.getMonth() ||
(today.getMonth()==birth.getMonth() &&
today.getDate()<birth.getDate())
){
age--;
}


// Ποσοστό ζωής
const percentage = (
livedDays/totalDays*100
).toFixed(1);


// Μπάρα
document.getElementById("bar").style.width =
percentage+"%";


// Κείμενο
document.getElementById("text").innerHTML=
`${age} ετών • ${remainingDays.toLocaleString()} ημέρες μέχρι τα 80 • ${percentage}%`;

</script>
